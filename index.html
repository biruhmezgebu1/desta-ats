function scoreCandidate(c,clientName){
var rules=CLIENT_RULES[clientName];if(!rules||!clientName)return{score:0,max:0,pct:0,flags:[]};

if(rules.creds.length>0){max+=30;if(rules.creds.indexOf(c.Credential)>=0)score+=30;else flags.push("Credential not typical for "+clientName)}
/* Population match */
if(rules.pops.length>0){max+=20;if(rules.pops.indexOf(c.Population)>=0)score+=20;else if(c.Population)flags.push("Population mismatch")}

/* License status */
max+=10;if(c.LicenseStatus==="Active")score+=10;else if(c.LicenseStatus==="Expired")flags.push("License expired");

return{score:score,max:max,pct:pct,flags:flags}}

{loc}<span onClick={function(){var locs=f.targetLocation.split(",").filter(function(x){return x.trim()&&x!==loc});set("targetLocation",locs.join(","))}} style={{cursor:"pointer",fontWeight:700,fontSize:13,color:C.rd,lineHeight:1}}>&times;</span></span>})}

/* ========== DETAIL MODAL ========== */

var _ls=useState(c.LicenseStatus||"Not Verified"),ls=_ls[0],sLS=_ls[1];var _le=useState(c.LicenseExpiry||""),le=_le[0],sLE=_le[1];var _ln=useState(c.LicenseNumber||""),ln=_ln[0],sLN=_ln[1];
var _moveErr=useState(""),moveErr=_moveErr[0],sMoveErr=_moveErr[1];

sMoveErr("");post({event:"ats_move_candidate",id:c.ID,status:s,movedBy:p.user});

if(s==="8 - Started (Day 1)"){post({event:"op_add_provider",id:"P"+Date.now(),name:c.Name,credential:c.Credential,licenseState:c.LicenseState,licenseNumber:c.LicenseNumber||"",npi:c.NPI||"",client:c.Client,status:"Onboarding",email:c.Email||"",phone:c.Phone||"",startDate:new Date().toISOString().slice(0,10),specialty:c.Specialty||"",addedBy:"ATS-Auto"})}
p.onUpdate()};
var addNote=function(){if(!nt.trim())return;post({event:"ats_add_note",candidateId:c.ID,candidateName:c.Name,noteType:ntp,author:p.user,text:nt.trim()});sNt("");p.onUpdate()};
var lc=ls==="Active"?C.gn:ls==="Expired"?C.rd:C.or;var ll=LL[c.LicenseState];
var vn=p.role==="admin"?notes:notes.filter(function(n){return n.NoteType==="internal"});
return(<div className="modal-overlay" onClick={p.onClose}><div className="modal" onClick={function(e){e.stopPropagation()}} style={{animation:"fadeUp .3s ease"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
<div><div style={{fontSize:22,fontWeight:700,marginBottom:6}}>{c.Name}</div>
<div style={{display:"flex",gap:4,flexWrap:"wrap"}}><span className="badge" style={{background:C.lbl,color:C.bl,fontSize:12,padding:"4px 12px"}}>{c.Credential}</span><span className="badge" style={{background:"#E8F5E9",color:C.gn,padding:"4px 12px"}}>{c.LicenseState}</span><span className="badge" style={{background:SC[c.Status],color:C.wh,padding:"4px 12px"}}>{c.Status?c.Status.split(" - ")[1]:""}</span></div></div>
<button className="btn" onClick={p.onClose} style={{background:"#f5f5f5",color:C.gy}}>Close</button></div>
<div style={{marginBottom:14}}><div style={{fontSize:11,color:C.gy,marginBottom:6}}>MOVE TO</div>
<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{STATUSES.map(function(s){var on=s===c.Status;return <button key={s} className="btn" onClick={function(){if(!on)moveTo(s)}} style={{background:on?SC[s]:"#f5f5f5",color:on?C.wh:C.gy,fontSize:10,padding:"5px 10px",borderRadius:12}}>{s.split(" - ")[1]}</button>})}</div>
{moveErr&&<div style={{marginTop:6,fontSize:12,color:C.rd,background:"#FFEBEE",padding:"6px 10px",borderRadius:4}}>&#9888; {moveErr}</div>}
</div>
{(function(){var sc2=scoreCandidate(c,c.Client);var dq=getAutoDisqualify(c);var days=getDaysInStage(c);
if(sc2.pct===0&&dq.length===0&&days===0)return null;
return <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
{sc2.pct>0&&<div style={{padding:"6px 12px",borderRadius:6,background:sc2.pct>=70?"#E8F5E9":sc2.pct>=40?"#FFF3E0":"#FFEBEE",fontSize:12}}><strong style={{color:sc2.pct>=70?C.gn:sc2.pct>=40?C.or:C.rd}}>{sc2.pct}% match</strong> for {c.Client}</div>}
{days>0&&<div style={{padding:"6px 12px",borderRadius:6,background:"#f5f5f5",fontSize:12,color:C.gy}}>{days} days in current stage</div>}
{dq.map(function(d,i){return <div key={i} style={{padding:"6px 12px",borderRadius:6,background:"#FFEBEE",fontSize:12,color:C.rd}}>&#9888; {d}</div>})}
{sc2.flags.map(function(f,i){return <div key={"f"+i} style={{padding:"6px 12px",borderRadius:6,background:"#FFF8E1",fontSize:12,color:C.or}}>{f}</div>})}
</div>})()}
<div style={{display:"inline-flex",gap:4,marginBottom:16,background:"#f5f5f5",borderRadius:20,padding:3}}>
{["details","license","notes"].map(function(t){return <button key={t} className={"tab"+(tab===t?" on":"")} onClick={function(){sT(t)}}>{t==="details"?"Details":t==="license"?"License":"Notes ("+vn.length+")"}</button>})}</div>

{tab==="details"&&<div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,fontSize:13}}>
{[["Client",c.Client],["Source",c.Source],["Email",c.Email],["Phone",c.Phone],["City",c.City],["Employer",c.Employer],["Population",c.Population],["Setting",c.Setting],["Telehealth",c.TelehealthPref],["Years Exp",c.YearsExp],["Target Locations",c.TargetLocation||c.targetLocation||""],["Added by",c.AddedBy],["Added",c.AddedAt?new Date(c.AddedAt).toLocaleDateString():""]].map(function(r){

{p.role==="admin"&&<div style={{marginTop:20,paddingTop:16,borderTop:"1px solid #f0f0f0"}}><button className="btn" onClick={function(){post({event:"ats_delete_candidate",id:c.ID});p.onClose();p.onUpdate()}} style={{background:C.rd,color:C.wh}}>Delete Candidate</button></div>}</div>}

{tab==="license"&&<div><div style={{background:ls==="Active"?"#E8F5E9":"#FFF8E1",borderRadius:10,padding:16,marginBottom:14}}>
<div style={{fontSize:18,fontWeight:700,color:lc}}>&#9679; {ls}</div>{le&&<div style={{fontSize:13,marginTop:4}}>Expires: {le}</div>}{ln&&<div style={{fontSize:13}}>License #: {ln}</div>}
{c.LicenseVerifiedBy&&<div style={{fontSize:12,color:C.gy,marginTop:6}}>Verified by {c.LicenseVerifiedBy}</div>}</div>
{ll&&<div style={{marginBottom:14}}><div style={{fontSize:12,fontWeight:600,marginBottom:4}}>Verify on state board:</div><a href={ll.u} target="_blank" className="lic-link">{ll.n} &rarr;</a></div>}
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
<div><div style={{fontSize:11,color:C.gy,marginBottom:4}}>Status</div><select className="input" value={ls} onChange={function(e){sLS(e.target.value)}}><option>Not Verified</option><option>Active</option><option>Expired</option><option>Not Found</option><option>Under Investigation</option></select></div>
<div><div style={{fontSize:11,color:C.gy,marginBottom:4}}>Expiration</div><input className="input" type="date" value={le} onChange={function(e){sLE(e.target.value)}}/></div>
<div><div style={{fontSize:11,color:C.gy,marginBottom:4}}>License #</div><input className="input" value={ln} onChange={function(e){sLN(e.target.value)}}/></div></div>
<button className="btn" onClick={function(){post({event:"ats_verify_license",id:c.ID,licenseStatus:ls,licenseExpiry:le,licenseNumber:ln,verifiedBy:p.user});p.onUpdate()}} style={{background:C.bl,color:C.wh,padding:"10px 24px"}}>Save Verification</button></div>}

{tab==="notes"&&<div>
<div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}}>
{[{v:"internal",l:"Note",bg:C.lbl,c:C.bl},{v:"client",l:"Client Note",bg:"#FFF8E1",c:C.br},{v:"call",l:"Call Log",bg:"#E8F5E9",c:C.gn},{v:"email",l:"Email Log",bg:"#F3E5F5",c:C.pu},{v:"text",l:"Text Log",bg:"#E0F2F1",c:C.tl}].map(function(t){
return <span key={t.v} onClick={function(){sNtp(t.v)}} className="badge" style={{cursor:"pointer",padding:"5px 12px",fontSize:11,background:ntp===t.v?t.bg:"#f5f5f5",color:ntp===t.v?t.c:C.gy,border:"1px solid "+(ntp===t.v?t.c:"#E0E0E0")}}>{t.l}</span>})}
</div>
<div style={{display:"flex",gap:8,marginBottom:14}}>
<input className="input" value={nt} onChange={function(e){sNt(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter")addNote()}} placeholder={ntp==="call"?"Log call details... (use @name to mention)":ntp==="email"?"Log email sent/received...":ntp==="text"?"Log text message...":"Add a note... (use @name to mention)"}/>
<button className="btn" onClick={addNote} style={{background:C.bl,color:C.wh,flexShrink:0}}>Add</button></div>
{vn.length===0&&<div style={{color:C.gy,textAlign:"center",padding:24}}>No notes or communications logged yet.</div>}
{vn.slice().reverse().map(function(n,i){
var typeStyles={internal:{bg:"#f8f9ff",bc:C.bl,label:"Note"},client:{bg:"#fdf8f2",bc:C.br,label:"Client"},call:{bg:"#f1f8e9",bc:C.gn,label:"Call"},email:{bg:"#fce4ec",bc:C.pu,label:"Email"},text:{bg:"#e0f7fa",bc:C.tl,label:"Text"}};
var ts=typeStyles[n.NoteType]||typeStyles.internal;
var textWithMentions=n.Text.replace(/@(\w+)/g,'<strong style="color:#1E4A8A">@$1</strong>');
return <div key={i} style={{borderLeft:"3px solid "+ts.bc,padding:"10px 14px",marginBottom:6,background:ts.bg,borderRadius:"0 6px 6px 0",fontSize:13}}>
<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>

<span style={{fontSize:11,color:C.gy}}>{n.Author} &mdash; {n.Timestamp?new Date(n.Timestamp).toLocaleString():""}</span>
<span className="badge" style={{background:ts.bg,color:ts.bc,border:"1px solid "+ts.bc}}>{ts.label}</span>
</div>
<div dangerouslySetInnerHTML={{__html:textWithMentions}}/></div>})}</div>}
</div></div>)}
