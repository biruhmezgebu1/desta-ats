function scoreCandidate(c,clientName){
var rules=CLIENT_RULES[clientName];if(!rules||!clientName)return{score:0,max:0,pct:0,flags:[]};
var score=0;var max=0;var flags=[];
/* State match */
if(rules.states.length>0){max+=30;if(rules.states.indexOf(c.LicenseState)>=0)score+=30;else flags.push("Wrong state for "+clientName)}
/* Credential match */
if(rules.creds.length>0){max+=30;if(rules.creds.indexOf(c.Credential)>=0)score+=30;else flags.push("Credential not typical for "+clientName)}
/* Population match */
if(rules.pops.length>0){max+=20;if(rules.pops.indexOf(c.Population)>=0)score+=20;else if(c.Population)flags.push("Population mismatch")}
/* Setting match */
if(rules.settings.length>0){max+=10;if(rules.settings.indexOf(c.Setting)>=0)score+=10}
/* License status */
max+=10;if(c.LicenseStatus==="Active")score+=10;else if(c.LicenseStatus==="Expired")flags.push("License expired");
var pct=max>0?Math.round(score/max*100):0;
return{score:score,max:max,pct:pct,flags:flags}}

{id:"initial",name:"Initial Outreach",dir:"to-candidate",subject:"Exciting Opportunity in Mental Health — {role}",body:"Dear {name},\n\nI hope this message finds you well. My name is {recruiter}, and I'm reaching out on behalf of {client}, a {clientDesc}.\n\nWe're currently looking for a {role} to join their team{location}. Based on your background and credentials, I believe this could be an excellent fit.\n\nWould you be open to a brief conversation this week to learn more about the position?\n\nLooking forward to hearing from you."},
{id:"followup1",name:"Follow-Up 1",dir:"to-candidate",subject:"Following Up — {role} Opportunity at {client}",body:"Dear {name},\n\nI wanted to follow up on my previous message regarding the {role} opportunity at {client}.\n\nI understand you may be busy, and I wanted to make sure this didn't get lost in your inbox. The position offers {highlights}, and I'd love to share more details at your convenience.\n\nWould a quick 10-minute call work for you this week?"},
{id:"followup2",name:"Follow-Up 2 (Final)",dir:"to-candidate",subject:"Final Follow-Up — {role} at {client}",body:"Dear {name},\n\nI'm reaching out one more time regarding the {role} position at {client}. I want to respect your time, so this will be my last follow-up on this particular opportunity.\n\nIf you're interested now or in the future, feel free to reach out at any time. I'd be happy to discuss how this role aligns with your career goals.\n\nWishing you all the best."},
{id:"screening",name:"Screening Invite",dir:"to-candidate",subject:"Screening Call — {client}",body:"Dear {name},\n\nThank you for your interest in the {role} position at {client}.\n\nI'd like to schedule a brief screening call to discuss the role in more detail and answer any questions.\n\nPlease let me know your availability for a 15-20 minute call on any of the following days:\n\n• {slot1}\n• {slot2}\n• {slot3}"}
],
"clearance":[
{id:"nameclear",name:"Name Clearance Request",dir:"to-client",subject:"Name Clearance — "+new Date().toLocaleDateString(),body:"Hi {clientContact},\n\nCould you please provide name clearance for the following candidate(s)?\n\n• {name}, {credential}\n\nThanks,"}
],
"presentation":[
{id:"present",name:"Candidate Presentation",dir:"to-client",subject:"Candidate Presentation — {name}, {credential}",body:"Hi {clientContact},\n\nHappy to present {name}, {credential} as a candidate for your {targetLocations} team.\n\nBackground & Experience\n• [Key clinical experience summary]\n• [Relevant specialties / patient populations]\n• [Current role / prior experience]\n• [Notable highlights / differentiators]\n\nTarget Details\n• Schedule: {schedule}\n• Compensation: [Compensation expectations]\n• Location preference: {targetLocations}\n• Transition timeline (if applicable): [Timeline]\n\nAvailability to Connect\n• {slot1}\n• {slot2}\n\nPlease let me know what your availability looks like, and I'll coordinate next steps.\n\nThanks,"},
{id:"present_short",name:"Quick Presentation",dir:"to-client",subject:"Candidate — {name}, {credential} ({licenseState})",body:"Hi {clientContact},\n\nQuick candidate for {client}:\n\n{name} — {credential}, {licenseState}\n{yearsExp} years experience | {specialty}\nLicense: {licenseStatus} ({licenseNumber})\nSetting: {setting} | Telehealth: {telehealth}\nTarget Location(s): {targetLocations}\n\nResume attached. Let me know if you'd like to proceed."},
{id:"present_batch",name:"Batch Presentation (Multiple)",dir:"to-client",subject:"Candidate Pipeline Update — {client} ({count} candidates)",body:"Hi {clientContact},\n\nHere is the current pipeline update for {client}.\n\n━━━━━━━━━━━━━━━━━━━━━━━━━\nCANDIDATE 1\n━━━━━━━━━━━━━━━━━━━━━━━━━\nName: \nCredential: \nLicense: \nYears Exp: \nFit Notes: \n\n━━━━━━━━━━━━━━━━━━━━━━━━━\nCANDIDATE 2\n━━━━━━━━━━━━━━━━━━━━━━━━━\nName: \nCredential: \nLicense: \nYears Exp: \nFit Notes: \n\n━━━━━━━━━━━━━━━━━━━━━━━━━\nCANDIDATE 3\n━━━━━━━━━━━━━━━━━━━━━━━━━\nName: \nCredential: \nLicense: \nYears Exp: \nFit Notes: \n\nConverted resumes attached. Please review and advise on next steps."}
],
"reference":[
{id:"refreq",name:"Reference + License Request (to Candidate)",dir:"to-candidate",subject:"{client} — Next Steps",body:"Hi {name},\n\nWe're glad to hear your conversation with [Interviewer Name] went well — they'd like to move forward with next steps.\n\nCould you please provide:\n• A copy of your {credential} license\n• A copy of your driver's license\n\nAdditionally, please share 3 references in the following format:\n• Name\n• Current role and organization\n• Contact info (email + phone)\n• Relationship to you\n\nLet me know if you have any questions.\n\nThanks,"},
{id:"refpres",name:"Reference + License Submission (to Client)",dir:"to-client",subject:"{name} — References & Licenses",body:"Hi {clientContact},\n\nBelow are the reference details for {name}:\n\nReference 1\n• Name:\n• Current Employer:\n• Contact: [Phone] | [Email]\n• Relationship:\n\nReference 2\n• Name:\n• Current Employer:\n• Contact: [Phone] | [Email]\n• Relationship:\n\nReference 3\n• Name:\n• Current Employer:\n• Contact: [Phone] | [Email]\n• Relationship:\n\nI've also attached the candidate's license and driver's license.\n\nPlease let me know if anything further is needed.\n\nBest,"}
],
"background":[
{id:"bgreq",name:"Background Check Info Request (to Candidate)",dir:"to-candidate",subject:"RE: {client} — Next Steps",body:"Hi {name},\n\nGreat news — {client} has connected with your references.\n\nTo move forward, we'll need the following details to complete the background check:\n• Full legal name (including middle name)\n• Date of birth\n• Social Security number\n\nIf you prefer, I'm happy to collect this over a quick call instead.\n\nThanks,"},
{id:"bgpres",name:"Background Check Info Submission (to Client)",dir:"to-client",subject:"RE: {name} — Background Check",body:"Hi {clientContact},\n\nBelow is the information for the background check:\n• Full legal name:\n• DOB:\n• SSN:\n• Home address:\n• Email: {email}\n\nBest,"}
]};

var CATEGORIES=[{id:"outreach",name:"Outreach",icon:"📤",color:C.bl},{id:"clearance",name:"Clearance",icon:"🔍",color:C.or},{id:"presentation",name:"Presentation",icon:"📋",color:C.gn},{id:"reference",name:"Reference",icon:"📑",color:C.pu},{id:"background",name:"Background",icon:"🔒",color:C.br}];

var CLIENT_DESC={"Sterling Institute":"mental health practice in Connecticut specializing in child and adolescent psychiatry","Contemporary Care":"multi-state mental health practice serving Connecticut, New Jersey, and Florida","DOCs Medical Group":"on-site medical group in Connecticut","Ritu Suri & Associates":"outpatient mental health practice"};
var CLIENT_HIGHLIGHTS={"Sterling Institute":"competitive compensation, a hybrid schedule, and a supportive clinical team","Contemporary Care":"flexible hybrid scheduling across multiple state locations","DOCs Medical Group":"a structured 3×12 schedule with a close-knit clinical team","Ritu Suri & Associates":"a collaborative outpatient environment with flexible scheduling"};
var CLIENT_CONTACTS={"Sterling Institute":"Hiring Manager","Contemporary Care":"Practice Manager","DOCs Medical Group":"Office Manager","Ritu Suri & Associates":"Dr. Ritu Suri"};

var allTemplates=[];
CATEGORIES.forEach(function(cat){(TEMPLATES[cat.id]||[]).forEach(function(t){allTemplates.push(Object.assign({},t,{category:cat.id,catName:cat.name,catIcon:cat.icon,catColor:cat.color}))})});

var selTpl=allTemplates.find(function(t){return t.id===tpl})||allTemplates[0];
var cand=candidates.find(function(c){return c.ID===tCand});
var clientCands=candidates.filter(function(c){return c.Client===tClient});
var selLead=null;
if(tRecipType==="lead"&&tLeadId){selLead=(db.sourcedLeads||[]).find(function(l){return l.SL_ID===tLeadId})}
if(selLead){cand={ID:selLead.SL_ID,Name:selLead.Name,Credential:selLead.Credential,LicenseState:selLead.State,LicenseNumber:"",LicenseStatus:"",NPI:"",YearsExp:"",Specialty:"",Employer:"",Population:"",Setting:"",TelehealthPref:"",City:selLead.City,Email:selLead.Email,Phone:selLead.Phone,Client:selLead.TargetClient||tClient}}

var fillTemplate=function(text){
var t=text;
t=t.replace(/\{name\}/g,cand?cand.Name:"[Candidate Name]");
t=t.replace(/\{credential\}/g,cand?cand.Credential:"[Credential]");
t=t.replace(/\{licenseState\}/g,cand?cand.LicenseState:"[State]");
t=t.replace(/\{licenseNumber\}/g,cand?(cand.LicenseNumber||"[License #]"):"[License #]");
t=t.replace(/\{licenseStatus\}/g,cand?(cand.LicenseStatus||"Not Verified"):"[License Status]");
t=t.replace(/\{npi\}/g,cand?(cand.NPI||"[NPI]"):"[NPI]");
t=t.replace(/\{yearsExp\}/g,cand?(cand.YearsExp||"[Years]"):"[Years]");
t=t.replace(/\{specialty\}/g,cand?(cand.Specialty||"[Specialty]"):"[Specialty]");
t=t.replace(/\{employer\}/g,cand?(cand.Employer||"[Current Employer]"):"[Current Employer]");
t=t.replace(/\{population\}/g,cand?(cand.Population||"[Population]"):"[Population]");
t=t.replace(/\{setting\}/g,cand?(cand.Setting||"[Setting]"):"[Setting]");
t=t.replace(/\{telehealth\}/g,cand?(cand.TelehealthPref||"[Telehealth Pref]"):"[Telehealth Pref]");
t=t.replace(/\{city\}/g,cand?(cand.City||"[City]"):"[City]");
t=t.replace(/\{email\}/g,cand?(cand.Email||"[Email]"):"[Email]");
t=t.replace(/\{phone\}/g,cand?(cand.Phone||"[Phone]"):"[Phone]");
t=t.replace(/\{schedule\}/g,"[Schedule/Availability]");
t=t.replace(/\{matchNotes\}/g,"[Why this candidate fits this client]");
t=t.replace(/\{count\}/g,"[#]");
t=t.replace(/\{client\}/g,tClient);
t=t.replace(/\{clientDesc\}/g,CLIENT_DESC[tClient]||"healthcare practice");
t=t.replace(/\{clientContact\}/g,CLIENT_CONTACTS[tClient]||"[Client Contact]");
t=t.replace(/\{role\}/g,cand?cand.Credential:"[Role]");
t=t.replace(/\{location\}/g,cand&&cand.LicenseState?" in "+cand.LicenseState:"");
t=t.replace(/\{targetLocations\}/g,cand?(cand.TargetLocation||cand.targetLocation||"[Target Locations]"):"[Target Locations]");
t=t.replace(/\{highlights\}/g,CLIENT_HIGHLIGHTS[tClient]||"competitive compensation and a supportive environment");
t=t.replace(/\{recruiter\}/g,user);
t=t.replace(/\{slot1\}/g,"[Day/Time Option 1]");t=t.replace(/\{slot2\}/g,"[Day/Time Option 2]");t=t.replace(/\{slot3\}/g,"[Day/Time Option 3]");
t=t.replace(/\{deadline\}/g,"[Deadline Date]");
t=t.replace(/\{referencesStatus\}/g,"[Pending/Collected]");
t=t.replace(/\{bgStatus\}/g,"[Clear/Pending/Flagged]");t=t.replace(/\{bgDate\}/g,"[Date]");
return t};

var sigBlock=emailSig?"\n\n"+emailSig:"\n\nBest regards,\n"+user+"\nHealthcare Recruiting Associate\nDestaHealth Recruiting";
var filledSubject=fillTemplate(selTpl.subject);
var filledBody=fillTemplate(selTpl.body)+sigBlock;

var copyAll=function(){navigator.clipboard.writeText("Subject: "+filledSubject+"\n\n"+filledBody);sCopied2(true);setTimeout(function(){sCopied2(false)},2000)};
var openGmail=function(){var to=cand&&cand.Email?cand.Email:"";window.open("https://mail.google.com/mail/?view=cm&to="+encodeURIComponent(to)+"&su="+encodeURIComponent(filledSubject)+"&body="+encodeURIComponent(filledBody),"_blank")};
var logSent=function(){
if(selLead){var nextStat=selLead.Status==="Sourced"?"Outreach 1":selLead.Status==="Outreach 1"?"Outreach 2":selLead.Status==="Outreach 2"?"Outreach 3 (Final)":selLead.Status;postJSON({event:"source_lead_log_outreach",id:selLead.SL_ID,by:user,channel:tChannel||"Email",template:selTpl.name+" ("+selTpl.catName+")",response:"",responseAt:"",newStatus:nextStat});setTimeout(load,1500);return}
if(!cand)return;post({event:"ats_add_note",candidateId:cand.ID,candidateName:cand.Name,noteType:"email",author:user,text:"Template sent: "+selTpl.name+" ("+selTpl.catName+") — "+filledSubject});setTimeout(load,1500)
};

return <div>
{/* Category selector */}
<div style={{display:"flex",gap:6,marginBottom:12}}>
{CATEGORIES.map(function(cat){var count=(TEMPLATES[cat.id]||[]).length;var active=(selTpl.category===cat.id);
return <div key={cat.id} onClick={function(){sTpl((TEMPLATES[cat.id]||[])[0].id)}} style={{flex:1,padding:"10px 8px",borderRadius:8,border:"1.5px solid "+(active?cat.color:"rgba(0,0,0,.06)"),background:active?"rgba(0,0,0,.02)":"#fff",cursor:"pointer",textAlign:"center",transition:"all .15s"}}>
<div style={{fontSize:14}}>{cat.icon}</div>
<div style={{fontSize:11,fontWeight:700,color:active?cat.color:C.ch,marginTop:4}}>{cat.name}</div>
<div style={{fontSize:9,color:C.gy}}>{count} template{count>1?"s":""}</div>
</div>})}
</div>

{/* Template selector within category */}
<div style={{display:"flex",gap:4,marginBottom:12}}>
{(TEMPLATES[selTpl.category]||[]).map(function(t){return <button key={t.id} className={"tab"+(tpl===t.id?" on":"")} onClick={function(){sTpl(t.id)}} style={{fontSize:11,whiteSpace:"nowrap"}}>
{t.name}<span className="badge" style={{background:t.dir==="to-client"?"#E8F5E9":"#E3F2FD",color:t.dir==="to-client"?C.gn:C.bl,fontSize:7,marginLeft:4}}>{t.dir==="to-client"?"→ Client":"→ Candidate"}</span>
</button>})}
</div>

{/* Controls */}
<div className="section">
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
<div><div style={{fontSize:11,color:C.gy,marginBottom:4}}>CLIENT</div>
<select className="input" value={tClient} onChange={function(e){sTClient(e.target.value);sTCand("");sTLeadId("")}}>{CLIENTS.map(function(c){return <option key={c}>{c}</option>})}</select></div>
<div>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
<div style={{fontSize:10,color:C.gy}}>RECIPIENT</div>
<div style={{display:"flex",gap:2}}>
<button type="button" onClick={function(){sTRecipType("candidate");sTLeadId("");sTLeadSearch("")}} style={{fontSize:9,padding:"2px 8px",border:"1px solid "+(tRecipType==="candidate"?C.bl:"#ddd"),background:tRecipType==="candidate"?C.bl:"#fff",color:tRecipType==="candidate"?C.wh:C.gy,borderRadius:4,cursor:"pointer"}}>Candidate</button>
<button type="button" onClick={function(){sTRecipType("lead");sTCand("");sTCandSearch("")}} style={{fontSize:9,padding:"2px 8px",border:"1px solid "+(tRecipType==="lead"?C.pu:"#ddd"),background:tRecipType==="lead"?C.pu:"#fff",color:tRecipType==="lead"?C.wh:C.gy,borderRadius:4,cursor:"pointer"}}>Sourced Lead</button>
<button type="button" onClick={function(){sTplPerfOpen(true)}} title="Template performance" style={{fontSize:9,padding:"2px 8px",border:"1px solid #ddd",background:"#fff",color:C.gy,borderRadius:4,cursor:"pointer"}}>📊 Perf</button>
<button type="button" onClick={function(){sVerifyPresetsOpen(true)}} title="Verification presets" style={{fontSize:9,padding:"2px 8px",border:"1px solid #ddd",background:"#fff",color:C.gy,borderRadius:4,cursor:"pointer"}}>📝 Verify</button>
</div>
</div>
{tRecipType==="candidate"?<div style={{position:"relative"}}><input className="input" value={tCandSearch} onChange={function(e){sTCandSearch(e.target.value);sTCand("")}} placeholder="Search candidate name..." style={{fontSize:12}}/>
{tCandSearch.length>=2&&!tCand&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1px solid #E0E0E0",borderRadius:6,maxHeight:180,overflowY:"auto",zIndex:10,boxShadow:"0 4px 12px rgba(0,0,0,.1)"}}>
{clientCands.filter(function(c){return c.Name.toLowerCase().indexOf(tCandSearch.toLowerCase())>=0}).slice(0,10).map(function(c){return <div key={c.ID} onClick={function(){sTCand(c.ID);sTCandSearch(c.Name+" ("+c.Credential+")")}} style={{padding:"8px 12px",fontSize:12,cursor:"pointer",borderBottom:"1px solid #f5f5f5"}} onMouseOver={function(e){e.currentTarget.style.background="#f0f4ff"}} onMouseOut={function(e){e.currentTarget.style.background=""}}>{c.Name} <span style={{color:C.gy}}>({c.Credential}, {c.LicenseState})</span></div>})}
{clientCands.filter(function(c){return c.Name.toLowerCase().indexOf(tCandSearch.toLowerCase())>=0}).length===0&&<div style={{padding:"8px 12px",fontSize:11,color:C.gy}}>No matches</div>}
</div>}
</div>:<div style={{position:"relative"}}><input className="input" value={tLeadSearch} onChange={function(e){sTLeadSearch(e.target.value);sTLeadId("")}} placeholder="Search sourced lead by name..." style={{fontSize:12,borderColor:C.pu}}/>
{tLeadSearch.length>=2&&!tLeadId&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1px solid "+C.pu,borderRadius:6,maxHeight:200,overflowY:"auto",zIndex:10,boxShadow:"0 4px 12px rgba(0,0,0,.1)"}}>
{(db.sourcedLeads||[]).filter(function(l){return(l.Name||"").toLowerCase().indexOf(tLeadSearch.toLowerCase())>=0&&l.Status!=="Promoted"&&l.Status!=="Bad Fit"&&!l.DeletedAt}).slice(0,15).map(function(l){return <div key={l.SL_ID} onClick={function(){sTLeadId(l.SL_ID);sTLeadSearch(l.Name+" ("+(l.Credential||"?")+", "+(l.Status||"")+")")}} style={{padding:"8px 12px",fontSize:12,cursor:"pointer",borderBottom:"1px solid #f5f5f5"}} onMouseOver={function(e){e.currentTarget.style.background="#FCF0FF"}} onMouseOut={function(e){e.currentTarget.style.background=""}}>{l.Name} <span style={{color:C.gy}}>({l.Credential||"?"}, {l.City||""}, {l.Status})</span></div>})}
{(db.sourcedLeads||[]).filter(function(l){return(l.Name||"").toLowerCase().indexOf(tLeadSearch.toLowerCase())>=0&&l.Status!=="Promoted"&&l.Status!=="Bad Fit"&&!l.DeletedAt}).length===0&&<div style={{padding:"8px 12px",fontSize:11,color:C.gy}}>No matches in Sourcing inventory</div>}
</div>}
{selLead&&<div style={{display:"flex",alignItems:"center",gap:6,marginTop:6}}><span style={{fontSize:10,color:C.pu}}>✓ Channel:</span><select className="input" value={tChannel} onChange={function(e){sTChannel(e.target.value)}} style={{fontSize:10,padding:"2px 6px",width:120}}><option>LinkedIn</option><option>Email</option><option>Phone</option><option>Text</option><option>In-person</option><option>Other</option></select><span style={{fontSize:10,color:C.gy}}>auto-logs on send</span></div>}
</div>}
</div>
</div></div>

{/* Preview */}
<div className="section">
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
<div style={{display:"flex",alignItems:"center",gap:8}}>
<div style={{fontSize:14,fontWeight:700}}>Preview</div>
<span className="badge" style={{background:selTpl.catColor,color:C.wh,fontSize:8}}>{selTpl.catName}</span>
<span className="badge" style={{background:selTpl.dir==="to-client"?"#E8F5E9":"#E3F2FD",color:selTpl.dir==="to-client"?C.gn:C.bl,fontSize:8}}>{selTpl.dir==="to-client"?"To Client":"To Candidate"}</span>
</div>
<div style={{display:"flex",gap:6}}>
<button className="btn" onClick={function(){copyAll();logSent()}} style={{background:C.bl,color:C.wh,fontSize:11}}>{copied2?"Copied!":"Copy All"}</button>
<button className="btn" onClick={function(){openGmail();logSent()}} style={{background:C.br,color:C.wh,fontSize:11}}>Open in Gmail</button>
</div></div>
<div style={{background:"#f8f9ff",borderRadius:8,padding:14,marginBottom:10}}>
<div style={{fontSize:11,color:C.gy,marginBottom:4}}>SUBJECT</div>
<div style={{fontSize:14,fontWeight:600}}>{filledSubject}</div></div>
<div style={{background:"#f8f9ff",borderRadius:8,padding:14,whiteSpace:"pre-wrap",fontSize:13,lineHeight:1.7,color:"#333",fontFamily:"system-ui"}}>{filledBody}</div>
</div>

{/* Quick send list */}
{clientCands.length>0&&<div className="section">
<div style={{fontSize:14,fontWeight:700,marginBottom:10}}>Quick Send — {tClient}</div>
<table><thead><tr><th>Candidate</th><th>Credential</th><th>Status</th><th>Email</th><th></th></tr></thead>
<tbody>{clientCands.filter(function(c){return c.Status!=="8 - Started (Day 1)"}).map(function(c){
return <tr key={c.ID}>
<td style={{fontWeight:600}}>{c.Name}</td>
<td><span className="badge" style={{background:C.lbl,color:C.bl}}>{c.Credential}</span></td>
<td><span className="badge" style={{background:SC[c.Status],color:C.wh,fontSize:9}}>{c.Status?c.Status.split(" - ")[1]:""}</span></td>
<td style={{fontSize:12,color:C.gy}}>{c.Email||"No email"}</td>
<td><button className="btn" onClick={function(){sTCand(c.ID)}} style={{background:tCand===c.ID?C.gn:"#f5f5f5",color:tCand===c.ID?C.wh:C.gy,fontSize:10,padding:"4px 10px"}}>{tCand===c.ID?"Selected":"Select"}</button></td>
</tr>})}</tbody></table>
</div>}

{/* Email Signature Settings */}
{crmTab==="sig"&&<div className="section" style={{border:"1.5px solid #8B7355"}}>
<div style={{fontSize:14,fontWeight:700,marginBottom:8,color:C.br}}>Email Signature</div>
<div style={{fontSize:11,color:C.gy,marginBottom:12}}>Your signature auto-appends to every template and is used across all outreach.</div>

<div style={{display:"flex",gap:6,marginBottom:12}}>
{[{id:"custom",l:"Custom"},{id:"desta",l:"DestaHealth Standard"},{id:"minimal",l:"Minimal"}].map(function(s){
return <button key={s.id} className="btn" onClick={function(){
if(s.id==="desta")saveEmailSig("Best regards,\n\n"+user+"\nHealthcare Recruiting Associate\nDestaHealth Recruiting\nbiruh@destahealth.com\nwww.destahealth.com");
if(s.id==="minimal")saveEmailSig(user+"\nDestaHealth Recruiting");
}} style={{background:C.lbl,color:C.bl,fontSize:11,padding:"6px 12px"}}>{s.l}</button>})}
</div>

<textarea className="input" value={emailSig} onChange={function(e){saveEmailSig(e.target.value)}} rows={6} placeholder={"Best regards,\n\n"+user+"\nHealthcare Recruiting Associate\nDestaHealth Recruiting\nbiruh@destahealth.com\nwww.destahealth.com"} style={{resize:"vertical",fontSize:12,fontFamily:"system-ui",marginBottom:12}}/>

<div style={{fontSize:11,fontWeight:600,marginBottom:6,color:C.ch}}>Preview</div>
<div style={{background:"#fff",border:"1px solid #E0E0E0",borderRadius:8,padding:16,fontSize:13,whiteSpace:"pre-wrap",lineHeight:1.6,color:C.ch}}>{emailSig||"Best regards,\n\n"+user+"\nHealthcare Recruiting Associate\nDestaHealth Recruiting"}</div>

<div style={{marginTop:16,paddingTop:12,borderTop:"1px solid #f0f0f0"}}>
<div style={{fontSize:12,fontWeight:600,marginBottom:6,color:C.ch}}>Set as Gmail Signature</div>
<div style={{fontSize:11,color:C.gy,marginBottom:8,lineHeight:1.6}}>To use this in Gmail: Open Gmail → Settings (gear icon) → See all settings → General tab → Scroll to Signature → Create new or edit existing → Paste your signature below.</div>

  var lines=[];
  var EMPTY="";
  lines.push("DestaHealth Weekly Brief — "+weekLabel);
  lines.push(EMPTY);
  if(brief.headline){lines.push(brief.headline);lines.push(EMPTY)}
  var kpiLine="KPIs: "+cur.kSourced+" sourced ("+delta(cur.kSourced,prev.kSourced)+"), ";
  kpiLine+=cur.kOutreach+" outreach ("+delta(cur.kOutreach,prev.kOutreach)+"), ";
  kpiLine+=cur.kResponses+" responses ("+delta(cur.kResponses,prev.kResponses)+"), ";
  kpiLine+=cur.kHires+" hires";
  lines.push(kpiLine);
  lines.push(EMPTY);
  if(brief.highlights){lines.push("HIGHLIGHTS:");lines.push(brief.highlights);lines.push(EMPTY)}
  if(brief.blockers){lines.push("BLOCKERS:");lines.push(brief.blockers);lines.push(EMPTY)}
  if(brief.lastWeekCheck&&brief.lastWeekCheck.length){
    lines.push("LAST WEEK'S COMMITMENTS:");
    brief.lastWeekCheck.forEach(function(c){
      var icon=c.status==="done"?"[OK]":c.status==="partial"?"[~]":"[MISS]";
      lines.push(icon+" "+c.commitment+" -> "+c.result);
    });
    lines.push(EMPTY);
  }
  if(brief.clientCards&&brief.clientCards.length){
    lines.push("BY CLIENT:");
    brief.clientCards.forEach(function(cc){lines.push("- "+cc.client+": "+cc.narrative)});
    lines.push(EMPTY);
  }
  if(brief.perAssociate&&brief.perAssociate.length){
    lines.push("PER ASSOCIATE:");
    brief.perAssociate.forEach(function(a){
      var s=a.name+": "+a.summary;
      if(a.topWin)s+=" WIN: "+a.topWin;
      if(a.topMiss)s+=" MISS: "+a.topMiss;
      lines.push(s);
    });
    lines.push(EMPTY);
  }
  lines.push("— "+user);
  return lines.join("\n");
})();

var copyBrief=function(){navigator.clipboard.writeText(briefText);sWbCopied("clipboard");setTimeout(function(){sWbCopied("")},2000)};
var emailBrief=function(){var subject=encodeURIComponent("DestaHealth Weekly Brief — "+weekLabel);var body=encodeURIComponent(briefText);var to=encodeURIComponent(briefRecipients||"");window.open("mailto:"+to+"?subject="+subject+"&body="+body,"_blank");sWbCopied("email");setTimeout(function(){sWbCopied("")},2000)};
var saveBrief=function(){
  postJSON({event:"weekly_brief_save",weekStart:weekStartISO,weekEnd:weekEndISO,savedBy:user,highlights:brief.highlights||wbHighlights,blockers:brief.blockers||wbBlockers,flags:wbFlags,nextWeekPriorities:wbNextWeekPriorities,statsJSON:JSON.stringify(contextForAI),briefHTML:""}).then(function(){sWbCopied("saved");setTimeout(function(){sWbCopied("")},2000);setTimeout(load,500)})
};
var printBrief=function(){
  var html='<div style="font-family:Georgia,serif;max-width:760px;margin:0 auto;padding:30px;color:#222;line-height:1.5">';
  html+='<div style="border-bottom:3px solid #1E4A8A;padding-bottom:10px;margin-bottom:20px"><div style="font-size:11px;color:#666;letter-spacing:2px">DESTAHEALTH RECRUITING</div><div style="font-size:22px;font-weight:700;margin-top:4px">Weekly Brief</div><div style="font-size:13px;color:#666;margin-top:2px">'+weekLabel+'</div></div>';
  if(brief.headline)html+='<div style="font-size:16px;font-weight:600;line-height:1.4;padding:14px 16px;background:#EBF0F8;border-left:3px solid #1E4A8A;border-radius:4px;margin-bottom:20px">'+brief.headline+'</div>';
  html+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px">';
  [{l:"Sourced",n:cur.kSourced,d:delta(cur.kSourced,prev.kSourced),c:"#1E4A8A"},{l:"Outreach",n:cur.kOutreach,d:delta(cur.kOutreach,prev.kOutreach),c:"#1E4A8A"},{l:"Responses",n:cur.kResponses+" ("+cur.responseRate+"%)",d:delta(cur.kResponses,prev.kResponses),c:"#2E7D32"},{l:"Hires",n:cur.kHires,d:delta(cur.kHires,prev.kHires),c:"#7B1FA2"}].forEach(function(s){html+='<div style="text-align:center;padding:12px;background:#f8f9ff;border-radius:6px"><div style="font-size:22px;font-weight:700;color:'+s.c+'">'+s.n+'</div><div style="font-size:10px;color:#666;text-transform:uppercase">'+s.l+'</div><div style="font-size:10px;color:#888;margin-top:2px">'+s.d+'</div></div>'});
  html+='</div>';
  if(brief.highlights)html+='<h2 style="font-size:13px;color:#1E4A8A;border-bottom:1px solid #ddd;padding-bottom:4px;margin:20px 0 10px;text-transform:uppercase;letter-spacing:1px">Highlights</h2><div style="font-size:13px;white-space:pre-wrap;margin-bottom:18px">'+brief.highlights+'</div>';
  if(brief.blockers)html+='<h2 style="font-size:13px;color:#C62828;border-bottom:1px solid #ddd;padding-bottom:4px;margin:20px 0 10px;text-transform:uppercase;letter-spacing:1px">Blockers</h2><div style="font-size:13px;white-space:pre-wrap;margin-bottom:18px">'+brief.blockers+'</div>';
  if(brief.clientCards&&brief.clientCards.length){html+='<h2 style="font-size:13px;color:#1E4A8A;border-bottom:1px solid #ddd;padding-bottom:4px;margin:20px 0 10px;text-transform:uppercase;letter-spacing:1px">By client</h2>';brief.clientCards.forEach(function(cc){html+='<div style="padding:10px 14px;background:#f8f9ff;border-left:3px solid #1E4A8A;border-radius:4px;margin-bottom:8px"><div style="font-size:13px;font-weight:700;margin-bottom:4px">'+cc.client+'</div><div style="font-size:12px;line-height:1.5">'+cc.narrative+'</div>'+(cc.win?'<div style="font-size:11px;color:#2E7D32;margin-top:4px">Win: '+cc.win+'</div>':"")+(cc.blocker?'<div style="font-size:11px;color:#C62828;margin-top:2px">Blocker: '+cc.blocker+'</div>':"")+'</div>'})}
  if(brief.perAssociate&&brief.perAssociate.length){html+='<h2 style="font-size:13px;color:#1E4A8A;border-bottom:1px solid #ddd;padding-bottom:4px;margin:20px 0 10px;text-transform:uppercase;letter-spacing:1px">Per associate</h2>';brief.perAssociate.forEach(function(a){html+='<div style="padding:10px 14px;background:#fafafa;border-radius:4px;margin-bottom:8px"><div style="font-size:13px;font-weight:700">'+a.name+'</div><div style="font-size:12px;color:#555;margin-top:2px">'+a.summary+'</div>'+(a.topWin?'<div style="font-size:11px;color:#2E7D32;margin-top:4px">Top win: '+a.topWin+'</div>':"")+(a.topMiss?'<div style="font-size:11px;color:#C62828;margin-top:2px">Top miss: '+a.topMiss+'</div>':"")+(a.nextWeekCommit?'<div style="font-size:11px;color:#1E4A8A;margin-top:4px">Next week: '+a.nextWeekCommit+'</div>':"")+'</div>'})}
  if(brief.lastWeekCheck&&brief.lastWeekCheck.length){html+='<h2 style="font-size:13px;color:#1E4A8A;border-bottom:1px solid #ddd;padding-bottom:4px;margin:20px 0 10px;text-transform:uppercase;letter-spacing:1px">Last week\'s commitments</h2>';brief.lastWeekCheck.forEach(function(c){var col=c.status==="done"?"#2E7D32":c.status==="partial"?"#F57C00":"#C62828";var icon=c.status==="done"?"✓":c.status==="partial"?"~":"✗";html+='<div style="font-size:12px;padding:6px 0;border-bottom:1px solid #f0f0f0"><strong style="color:'+col+';margin-right:6px">'+icon+'</strong>'+c.commitment+' → <span style="color:'+col+'">'+c.result+'</span></div>'})}
  if(brief.decisions&&brief.decisions.length){html+='<h2 style="font-size:13px;color:#1E4A8A;border-bottom:1px solid #ddd;padding-bottom:4px;margin:20px 0 10px;text-transform:uppercase;letter-spacing:1px">Decisions made</h2>';brief.decisions.forEach(function(d){html+='<div style="font-size:12px;padding:6px 0"><strong>'+d.decision+'</strong>'+(d.context?' — '+d.context:"")+'</div>'})}
  if(wbPatterns&&wbPatterns.length){html+='<h2 style="font-size:13px;color:#1E4A8A;border-bottom:1px solid #ddd;padding-bottom:4px;margin:20px 0 10px;text-transform:uppercase;letter-spacing:1px">Patterns (4-week view)</h2>';wbPatterns.forEach(function(p){html+='<div style="padding:8px 12px;background:#FFFDE7;border-left:3px solid #F9A825;border-radius:4px;margin-bottom:6px"><div style="font-size:12px;font-weight:600">'+p.insight+'</div>'+(p.evidence?'<div style="font-size:11px;color:#666;margin-top:2px">'+p.evidence+'</div>':"")+(p.action?'<div style="font-size:11px;color:#1E4A8A;margin-top:2px"><strong>Action:</strong> '+p.action+'</div>':"")+'</div>'})}
  html+='<div style="margin-top:30px;padding-top:14px;border-top:1px solid #ddd;font-size:11px;color:#999;display:flex;justify-content:space-between"><span>Generated '+new Date().toLocaleString()+' by '+user+'</span><span>DestaHealth Recruiting</span></div></div>';
  var w=window.open("","_blank");w.document.write('<!DOCTYPE html><html><head><title>Weekly Brief — '+weekLabel+'</title><style>@page{size:letter;margin:.5in}body{margin:0;background:#fff}</style></head><body>'+html+'<scr'+'ipt>window.onload=function(){window.print()}</scr'+'ipt></body></html>');w.document.close();
};

return <div style={{animation:"fadeUp .3s ease"}}>

{/* === MASTHEAD === */}
<div className="section" style={{marginBottom:14,background:"linear-gradient(135deg,#1E4A8A,#3A6BB8)",color:C.wh,padding:"18px 22px",borderRadius:8}}>
<div style={{fontSize:11,opacity:.85,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>Weekly Brief</div>
<div style={{fontSize:13,opacity:.85,marginBottom:10}}>{weekLabel}</div>
{!brief.headline?<div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",flexWrap:"wrap"}}><button className="btn" onClick={generateBrief} disabled={wbDrafting} style={{background:C.wh,color:C.bl,fontSize:13,padding:"8px 18px",fontWeight:700}}>{wbDrafting?"Drafting…":"✨ Generate weekly brief"}</button><span style={{fontSize:12,opacity:.85}}>AI reads the full week + last week's commitments and authors the brief.</span></div>:<div><div style={{fontSize:17,fontWeight:600,lineHeight:1.4,paddingRight:80,position:"relative"}}>{brief.headline}<button className="btn" onClick={generateBrief} disabled={wbDrafting} style={{position:"absolute",right:0,top:0,background:"rgba(255,255,255,.18)",color:C.wh,fontSize:10,padding:"4px 10px"}}>{wbDrafting?"…":"↻ Refresh"}</button></div></div>}
</div>

{/* === KPI RIBBON === */}
<div className="section" style={{marginBottom:14}}>
<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10}}>
{[{l:"Sourced",n:cur.kSourced,p:prev.kSourced,c:C.bl},{l:"Outreach",n:cur.kOutreach,p:prev.kOutreach,c:C.bl},{l:"Responses",n:cur.kResponses,p:prev.kResponses,c:C.gn,sub:cur.responseRate+"% rate"},{l:"Promoted",n:cur.kPromoted,p:prev.kPromoted,c:C.pu},{l:"Hires",n:cur.kHires,p:prev.kHires,c:C.gn}].map(function(s,i){var dColor=deltaColor(s.n,s.p);return <div key={i} style={{padding:"14px 16px",background:"#f8f9ff",borderRadius:6,borderTop:"3px solid "+s.c}}>
<div style={{fontSize:11,color:C.gy,marginBottom:4,textTransform:"uppercase",letterSpacing:.5}}>{s.l}</div>
<div style={{fontSize:24,fontWeight:700,color:s.c,fontFamily:"Georgia,serif",lineHeight:1}}>{s.n}</div>
{s.sub&&<div style={{fontSize:11,color:C.gy,marginTop:2}}>{s.sub}</div>}
<div style={{fontSize:11,color:dColor,marginTop:6,fontWeight:600}}>{delta(s.n,s.p)} <span style={{color:C.gy,fontWeight:400}}>vs last week ({s.p})</span></div>
</div>})}
</div>
{brief.kpiNarrative&&<div style={{marginTop:12,padding:"10px 14px",background:"#fafafa",borderRadius:6,fontSize:13,lineHeight:1.5,color:"#444"}}>{brief.kpiNarrative}</div>}
</div>

{/* === LAST WEEK ACCOUNTABILITY === */}
{brief.lastWeekCheck&&brief.lastWeekCheck.length>0&&<div className="section" style={{marginBottom:14}}>
<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}><span style={{fontSize:14}}>📋</span><div style={{fontSize:13,fontWeight:700}}>Last week's commitments</div><div style={{fontSize:10,color:C.gy,marginLeft:"auto"}}>{brief.lastWeekCheck.filter(function(c){return c.status==="done"}).length}/{brief.lastWeekCheck.length} delivered</div></div>
{brief.lastWeekCheck.map(function(c,i){var icon=c.status==="done"?"✓":c.status==="partial"?"~":"✗";var col=c.status==="done"?C.gn:c.status==="partial"?C.or:C.rd;return <div key={i} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 0",borderBottom:i<brief.lastWeekCheck.length-1?"1px solid #f0f0f0":"none"}}>
<div style={{fontSize:16,fontWeight:700,color:col,minWidth:22}}>{icon}</div>
<div style={{flex:1,fontSize:13,lineHeight:1.5}}>{c.commitment}<br/><span style={{color:col,fontWeight:600}}>{c.result}</span></div>
</div>})}
</div>}

{/* === PER-CLIENT CARDS === */}
{brief.clientCards&&brief.clientCards.length>0&&<div style={{marginBottom:14}}>
<div style={{fontSize:11,fontWeight:700,color:C.gy,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>By client</div>
<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:10}}>
{brief.clientCards.map(function(cc,i){return <div key={i} className="section" style={{borderTop:"3px solid "+C.bl}}>
<div style={{fontSize:14,fontWeight:700,marginBottom:8}}>{cc.client}</div>
<div style={{fontSize:13,color:"#444",lineHeight:1.5,marginBottom:10}}>{cc.narrative}</div>
{cc.win&&<div style={{fontSize:11,padding:"6px 10px",background:"#E8F5E9",color:C.gn,borderRadius:4,marginBottom:4}}><strong>Win:</strong> {cc.win}</div>}
{cc.blocker&&<div style={{fontSize:11,padding:"6px 10px",background:"#FFEBEE",color:C.rd,borderRadius:4,marginBottom:4}}><strong>Blocker:</strong> {cc.blocker}</div>}
{cc.nextWeekFocus&&<div style={{fontSize:11,padding:"6px 10px",background:"#E3F2FD",color:C.bl,borderRadius:4}}><strong>Next week:</strong> {cc.nextWeekFocus}</div>}
</div>})}
</div>
</div>}

{/* === PER-ASSOCIATE SCORECARDS === */}
{brief.perAssociate&&brief.perAssociate.length>0&&<div className="section" style={{marginBottom:14}}>
<div style={{fontSize:11,fontWeight:700,color:C.gy,letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>Per associate</div>
<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:14}}>
{brief.perAssociate.map(function(a,i){var cur=Object.values(contextForAI.byAssociateThisWeek).find(function(x){return x.name===a.name})||{};var prv=Object.values(contextForAI.byAssociateLastWeek).find(function(x){return x.name===a.name})||{};return <div key={i} style={{padding:"12px 14px",background:a.name===user?"#E3F2FD":"#fafafa",borderRadius:6,borderLeft:"3px solid "+(a.name===user?C.bl:"#ddd")}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><div style={{fontSize:14,fontWeight:700}}>{a.name}{a.name===user&&<span style={{fontSize:9,color:C.bl,marginLeft:6}}>YOU</span>}</div></div>
<div style={{fontSize:12,color:C.gy,marginBottom:10,fontStyle:"italic"}}>{a.summary}</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,fontSize:10,marginBottom:10,color:C.gy}}>
<div>Sourced: <strong style={{color:"#444"}}>{cur.sourced||0}</strong> <span style={{color:deltaColor(cur.sourced||0,prv.sourced||0)}}>{delta(cur.sourced||0,prv.sourced||0)}</span></div>
<div>Outreach: <strong style={{color:"#444"}}>{cur.outreach||0}</strong> <span style={{color:deltaColor(cur.outreach||0,prv.outreach||0)}}>{delta(cur.outreach||0,prv.outreach||0)}</span></div>
<div>Resp: <strong style={{color:"#444"}}>{cur.responses||0}</strong> <span style={{color:deltaColor(cur.responses||0,prv.responses||0)}}>{delta(cur.responses||0,prv.responses||0)}</span></div>
<div>Promoted: <strong style={{color:"#444"}}>{cur.promoted||0}</strong></div>
</div>
{a.topWin&&<div style={{fontSize:11,padding:"6px 8px",background:"#E8F5E9",color:C.gn,borderRadius:4,marginBottom:4}}><strong>Top win:</strong> {a.topWin}</div>}
{a.topMiss&&<div style={{fontSize:11,padding:"6px 8px",background:"#FFEBEE",color:C.rd,borderRadius:4,marginBottom:4}}><strong>Top miss:</strong> {a.topMiss}</div>}
{a.nextWeekCommit&&<div style={{fontSize:11,padding:"6px 8px",background:"#E3F2FD",color:C.bl,borderRadius:4}}><strong>Next week:</strong> {a.nextWeekCommit}</div>}
</div>})}
</div>
</div>}

{/* === HIGHLIGHTS + BLOCKERS === */}
{(brief.highlights||brief.blockers)&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:10,marginBottom:14}}>
{brief.highlights&&<div className="section"><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}><span style={{fontSize:14}}>✅</span><div style={{fontSize:13,fontWeight:700}}>Highlights</div></div><div style={{fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{brief.highlights}</div></div>}
{brief.blockers&&<div className="section"><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}><span style={{fontSize:14}}>⚠</span><div style={{fontSize:13,fontWeight:700}}>Blockers</div></div><div style={{fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{brief.blockers}</div></div>}
</div>}

{/* === DECISIONS LOG === */}
{brief.decisions&&brief.decisions.length>0&&<div className="section" style={{marginBottom:14}}>
<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}><span style={{fontSize:14}}>🧭</span><div style={{fontSize:13,fontWeight:700}}>Decisions made this week</div></div>
{brief.decisions.map(function(d,i){return <div key={i} style={{padding:"8px 0",borderBottom:i<brief.decisions.length-1?"1px solid #f0f0f0":"none",fontSize:13,lineHeight:1.5}}><strong>{d.decision}</strong>{d.context&&<span style={{color:C.gy}}> — {d.context}</span>}</div>})}
</div>}

{/* === PATTERNS (4-week view) === */}
<div className="section" style={{marginBottom:14}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
<div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:14}}>🔍</span><div style={{fontSize:13,fontWeight:700}}>Patterns across the last 4 weeks</div></div>

</div>
{wbPatterns&&wbPatterns.length>0?wbPatterns.map(function(p,i){return <div key={i} style={{padding:"10px 12px",background:"#FFFDE7",borderLeft:"3px solid #F9A825",borderRadius:4,marginBottom:6}}>
<div style={{fontSize:13,fontWeight:600,marginBottom:3}}>{p.insight}</div>
{p.evidence&&<div style={{fontSize:11,color:C.gy,marginBottom:3}}>{p.evidence}</div>}
{p.action&&<div style={{fontSize:11,color:C.bl}}><strong>Action:</strong> {p.action}</div>}
</div>}):<div style={{fontSize:12,color:C.gy,fontStyle:"italic",padding:"10px 0"}}>Click ✨ Find patterns to surface 4-week trends and anomalies.</div>}
</div>

{/* === Manual inputs (collapsible) === */}
<div className="section" style={{marginBottom:14}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={function(){sWbInputsOpen(!wbInputsOpen)}}>
<div style={{fontSize:11,fontWeight:700,color:C.gy,letterSpacing:1,textTransform:"uppercase"}}>{wbInputsOpen?"▼":"▶"} Manual inputs (overrides)</div>
<div style={{fontSize:10,color:C.gy}}>auto-saved locally</div>
</div>
{wbInputsOpen&&<div style={{marginTop:14,display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:10}}>
<div><div style={{fontSize:10,fontWeight:600,color:C.gy,marginBottom:3}}>FLAGS (will appear in brief if filled)</div><textarea className="input" rows={3} value={wbFlags} onChange={function(e){sWbFlags(e.target.value)}} placeholder="Risks, surprises, what to watch" style={{fontSize:12,resize:"vertical"}}/></div>
<div><div style={{fontSize:10,fontWeight:600,color:C.gy,marginBottom:3}}>NEXT WEEK PRIORITIES (will appear in brief)</div><textarea className="input" rows={3} value={wbNextWeekPriorities} onChange={function(e){sWbNextWeekPriorities(e.target.value)}} placeholder="What we'll measure next Friday" style={{fontSize:12,resize:"vertical"}}/></div>
<div style={{gridColumn:"1/-1"}}><div style={{fontSize:10,fontWeight:600,color:C.gy,marginBottom:3}}>HIGHLIGHTS OVERRIDE (replaces AI version)</div><textarea className="input" rows={4} value={wbHighlights} onChange={function(e){sWbHighlights(e.target.value)}} placeholder="Leave blank to use AI version" style={{fontSize:12,resize:"vertical"}}/></div>
<div style={{gridColumn:"1/-1"}}><div style={{fontSize:10,fontWeight:600,color:C.gy,marginBottom:3}}>BLOCKERS OVERRIDE</div><textarea className="input" rows={3} value={wbBlockers} onChange={function(e){sWbBlockers(e.target.value)}} placeholder="Leave blank to use AI version" style={{fontSize:12,resize:"vertical"}}/></div>
</div>}

{ll&&<div style={{marginBottom:14}}><div style={{fontSize:12,fontWeight:600,marginBottom:4}}>Verify on state board:</div><a href={ll.u} target="_blank" className="lic-link">{ll.n} &rarr;</a></div>}
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
<div><div style={{fontSize:11,color:C.gy,marginBottom:4}}>Status</div><select className="input" value={ls} onChange={function(e){sLS(e.target.value)}}><option>Not Verified</option><option>Active</option><option>Expired</option><option>Not Found</option><option>Under Investigation</option></select></div>
<div><div style={{fontSize:11,color:C.gy,marginBottom:4}}>Expiration</div><input className="input" type="date" value={le} onChange={function(e){sLE(e.target.value)}}/></div>
<div><div style={{fontSize:11,color:C.gy,marginBottom:4}}>License #</div><input className="input" value={ln} onChange={function(e){sLN(e.target.value)}}/></div></div>
<button className="btn" onClick={function(){post({event:"ats_verify_license",id:c.ID,licenseStatus:ls,licenseExpiry:le,licenseNumber:ln,verifiedBy:p.user});p.onUpdate()}} style={{background:C.bl,color:C.wh,padding:"10px 24px"}}>Save Verification</button></div>}

{tab==="resume"&&<div>
{hasResume?<div>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,padding:"8px 12px",background:"#F0F8FF",borderRadius:6,borderLeft:"3px solid "+C.tl}}>
<div>
<div style={{fontSize:11,fontWeight:700,color:C.tl}}>📄 RESUME</div>
<div style={{fontSize:10,color:C.gy,marginTop:1}}>{c.ResumeFilename||"resume"}{c.AddedAt?" · uploaded "+new Date(c.AddedAt).toLocaleDateString():""}</div>
</div>
<div style={{display:"flex",gap:6}}>
{c.ResumeURL&&<a href={c.ResumeURL.replace("/preview","/view")} target="_blank" rel="noopener noreferrer" style={{background:C.tl,color:C.wh,fontSize:10,padding:"5px 12px",borderRadius:4,textDecoration:"none",fontWeight:600}}>Open in Drive →</a>}
</div>
</div>
{c.ResumeURL&&<iframe src={c.ResumeURL} style={{width:"100%",height:600,border:"1px solid #ddd",borderRadius:6,background:"#fff"}} title="Resume preview"/>}
</div>:<div style={{textAlign:"center",padding:30,color:C.gy,fontSize:12}}>No resume attached. Upload via Bulk Import or Parse Resume.</div>}
</div>}

{tab==="notes"&&<div>
<div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}}>
{[{v:"internal",l:"Note",bg:C.lbl,c:C.bl},{v:"client",l:"Client Note",bg:"#FFF8E1",c:C.br},{v:"call",l:"Call Log",bg:"#E8F5E9",c:C.gn},{v:"email",l:"Email Log",bg:"#F3E5F5",c:C.pu},{v:"text",l:"Text Log",bg:"#E0F2F1",c:C.tl}].map(function(t){
return <span key={t.v} onClick={function(){sNtp(t.v)}} className="badge" style={{cursor:"pointer",padding:"5px 12px",fontSize:11,background:ntp===t.v?t.bg:"#f5f5f5",color:ntp===t.v?t.c:C.gy,border:"1px solid "+(ntp===t.v?t.c:"#E0E0E0")}}>{t.l}</span>})}
</div>
<div style={{display:"flex",gap:8,marginBottom:14,position:"relative"}}>
<input className="input" value={nt} onChange={onNoteChange} onKeyDown={onNoteKey} placeholder={ntp==="call"?"Log call details... (type @ to mention)":ntp==="email"?"Log email sent/received...":ntp==="text"?"Log text message...":"Add a note... (type @ to mention)"} style={{flex:1}}/>
<button className="btn" onClick={openAtPicker} title="Mention a teammate" style={{background:"#fafafa",color:C.bl,flexShrink:0,fontSize:14}}>@</button>
<button className="btn" onClick={function(){var existing=[];try{existing=JSON.parse(c.OutreachAttempts||"[]")}catch(ee){existing=[]}sCandLog({channel:"LinkedIn",template:"",response:"",responseAt:"",sentAt:new Date().toISOString().slice(0,10),editIdx:null});sCandLogOpen(c)}} title="Log outreach attempt" style={{background:"#fafafa",color:C.pu,flexShrink:0,fontSize:11}}>+ Outreach</button>
<button className="btn" onClick={addNote} style={{background:C.bl,color:C.wh,flexShrink:0}}>Add</button>
{mDD&&mFiltered.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:180,marginTop:4,background:"#fff",border:"1px solid #ddd",borderRadius:8,boxShadow:"0 6px 20px rgba(0,0,0,.15)",zIndex:30,maxHeight:280,overflowY:"auto"}}>
{mFiltered.map(function(u,i){return <div key={u.Email} onMouseDown={function(e){e.preventDefault();pickMention(u)}} onMouseEnter={function(){sMSel(i)}} style={{padding:"10px 14px",cursor:"pointer",background:i===mSel?"#E3F2FD":"#fff",borderBottom:i<mFiltered.length-1?"1px solid #f0f0f0":"none",fontSize:13}}>
<div style={{fontWeight:600,color:C.bl}}>@{u.Name.split(" ")[0]} <span style={{color:"#444",fontWeight:400,marginLeft:4}}>· {u.Name}</span></div>
<div style={{fontSize:11,color:"#888",marginTop:2}}>{u.Email}{u.Role?" · "+u.Role:""}</div>
</div>})}
</div>}
{mDD&&mFiltered.length===0&&_allTaggable.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:180,marginTop:4,background:"#fff",border:"1px solid #ddd",borderRadius:8,padding:"10px 14px",fontSize:12,color:"#888",zIndex:30}}>No user matches "{mDD.filter}". Tip: ensure the teammate is in Admin Panel → Invites with an email.</div>}
{mDD&&_allTaggable.length===0&&<div style={{position:"absolute",top:"100%",left:0,right:180,marginTop:4,background:"#FFF8E1",border:"1px solid "+C.or,borderRadius:8,padding:"10px 14px",fontSize:12,color:C.or,zIndex:30}}>No internal users with email found. Add teammates in Admin Panel → Invites to enable @mentions.</div>}
</div>
{(function(){var oa=[];try{oa=JSON.parse(c.OutreachAttempts||"[]")}catch(e){oa=[]}if(oa.length===0)return null;return <div style={{marginBottom:14,padding:"10px 12px",background:"#FCF0FF",borderRadius:6,borderLeft:"3px solid "+C.pu}}>
<div style={{fontSize:11,fontWeight:700,color:C.pu,marginBottom:6,letterSpacing:.5}}>OUTREACH HISTORY ({oa.length})</div>
{oa.map(function(a,i){return <div key={i} style={{fontSize:11,padding:"6px 0",borderBottom:i<oa.length-1?"1px solid rgba(123,31,162,.15)":"none"}}>
<div><strong>{a.by||"?"}</strong> via {a.channel||"?"} {a.template?"("+a.template+")":""} {a.sent_at?"· "+new Date(a.sent_at).toLocaleDateString():""}</div>
{a.response&&<div style={{color:C.gy,marginTop:2}}>{a.response}</div>}
</div>})}
</div>})()}
{vn.length===0&&<div style={{color:C.gy,textAlign:"center",padding:24}}>No notes or communications logged yet.</div>}
{vn.slice().reverse().map(function(n,i){
var typeStyles={internal:{bg:"#f8f9ff",bc:C.bl,label:"Note"},client:{bg:"#fdf8f2",bc:C.br,label:"Client"},call:{bg:"#f1f8e9",bc:C.gn,label:"Call"},email:{bg:"#fce4ec",bc:C.pu,label:"Email"},text:{bg:"#e0f7fa",bc:C.tl,label:"Text"}};
var ts=typeStyles[n.NoteType]||typeStyles.internal;
var textWithMentions=n.Text.replace(/@(\w+)/g,'<strong style="color:#1E4A8A">@$1</strong>');
return <div key={i} style={{borderLeft:"3px solid "+ts.bc,padding:"10px 14px",marginBottom:6,background:ts.bg,borderRadius:"0 6px 6px 0",fontSize:13}}>
<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
<Av name={n.Author} src={p.getAvatar?p.getAvatar(""):null} size={20}/>
<span style={{fontSize:11,color:C.gy}}>{n.Author} &mdash; {n.Timestamp?new Date(n.Timestamp).toLocaleString():""}</span>
<span className="badge" style={{background:ts.bg,color:ts.bc,border:"1px solid "+ts.bc}}>{ts.label}</span>
</div>
<div dangerouslySetInnerHTML={{__html:textWithMentions}}/></div>})}</div>}



</div></div>)}


ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script></body></html>
